serverAddr = "{{ .Envs.FRP_SERVER_ADDR }}"
serverPort = 17000
auth.method = "token"
auth.token = "bench-token"
transport.tls.enable = false
transport.poolCount = 30

[[proxies]]
name = "bench-web"
type = "http"
localIP = "backend"
localPort = 80
customDomains = ["bench.local"]

[[proxies]]
name = "bench-ws"
type = "http"
localIP = "ws-echo"
localPort = 9090
customDomains = ["ws.local"]
