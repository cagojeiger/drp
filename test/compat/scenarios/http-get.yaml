name: http-get
description: Static HTTP echo GET through drps and frps
upstream:
  kind: http-echo
frpc:
  proxies:
    - name: web
      type: http
      localIP: "127.0.0.1"
      localPort: 0
      customDomains: ["test.local"]
request:
  method: GET
  host: test.local
  path: /
expect:
  mode: http
  status: 200
  min_body_bytes: 100
expected_divergence: []
