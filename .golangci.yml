version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - commentFormatting
        - hugeParam
  exclusions:
    paths:
      - poc
      - .repos
      - vendor

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - poc
      - .repos
      - vendor

output:
  sort-order:
    - file
