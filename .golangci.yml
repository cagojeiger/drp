version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - commentFormatting
  exclusions:
    paths:
      - poc
      - .repos
      - vendor
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - poc
      - .repos
      - vendor

output:
  sort-order:
    - file
