version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - errorlint
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - commentFormatting
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
  exclusions:
    paths:
      - poc
      - .repos
      - vendor
      - proto
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofumpt
  exclusions:
    paths:
      - poc
      - .repos
      - vendor

output:
  sort-order:
    - file
