name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.3

  test:
    name: Unit + Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run tests
        run: go test -v -race -cover ./internal/... ./test/e2e/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -trimpath -o bin/drps ./cmd/drps
          CGO_ENABLED=0 go build -trimpath -o bin/drpc ./cmd/drpc
      - name: Verify binaries
        run: |
          ./bin/drps --help || true
          ./bin/drpc --help || true
