name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  test:
    name: Unit Tests
    runs-on: arc-runner-set-drp
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test ./internal/... -v -timeout 60s

  vet:
    name: Go Vet
    runs-on: arc-runner-set-drp
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  e2e:
    name: E2E Tests (Docker)
    runs-on: arc-runner-set-drp
    container: catthehacker/ubuntu:act-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: E2E Tests
        run: go test ./test/ -v -timeout 300s
