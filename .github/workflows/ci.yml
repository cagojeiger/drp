name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test ./internal/... -v -timeout 60s

  e2e:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: E2E Tests
        run: go test ./test/ -v -timeout 300s
